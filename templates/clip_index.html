<!DOCTYPE html>
<html>
<head>
    <title>Image Classification - CLIP AI</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 25%, #f093fb 50%, #4facfe 75%, #00f2fe 100%);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 50%, rgba(255,105,180,0.15) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(0,255,255,0.1) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }
        .container { 
            max-width: 700px;
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 30px 80px rgba(0,0,0,0.2),
                        inset 0 1px 0 rgba(255,255,255,0.6);
            overflow: hidden;
            animation: slideUp 0.6s ease-out;
            border: 1px solid rgba(255,255,255,0.3);
            position: relative;
            z-index: 1;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            color: white;
            padding: 50px 30px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .header::before {
            content: '🖼️';
            position: absolute;
            top: 10px;
            right: 20px;
            font-size: 40px;
            opacity: 0.1;
        }
        .header::after {
            content: '🎯';
            position: absolute;
            bottom: 10px;
            left: 20px;
            font-size: 40px;
            opacity: 0.1;
        }
        h1 { 
            font-size: 36px; 
            font-weight: 700; 
            margin-bottom: 8px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }
        .subtitle { 
            font-size: 15px; 
            opacity: 0.95;
            letter-spacing: 0.5px;
        }
        .content { 
            padding: 40px 30px;
            position: relative;
        }
        .upload-box {
            border: 2px dashed rgba(102, 126, 234, 0.4);
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.05) 0%, rgba(240, 147, 251, 0.05) 100%);
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 25px;
            position: relative;
        }
        .upload-box:hover { 
            border-color: rgba(240, 147, 251, 0.6);
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.1) 0%, rgba(240, 147, 251, 0.1) 100%);
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.15);
        }
        .upload-box input { display: none; }
        .upload-icon { 
            font-size: 50px; 
            margin-bottom: 12px;
            display: inline-block;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        .upload-text { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 700; 
            margin-bottom: 4px;
            font-size: 16px;
        }
        .upload-hint { 
            color: #999; 
            font-size: 13px;
        }
        .file-name { 
            background: linear-gradient(135deg, #764ba2 0%, #f093fb 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 600;
            margin-top: 10px;
            font-size: 14px;
        }
        .button-group {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 30px;
        }
        button {
            padding: 14px 32px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            min-width: 140px;
        }
        .btn-classify {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            color: white;
            flex: 1;
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
            border: none;
        }
        .btn-classify:hover { 
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(102, 126, 234, 0.4);
        }
        .btn-classify:disabled { 
            opacity: 0.6; 
            cursor: not-allowed;
            transform: none;
        }
        .btn-clear {
            background: linear-gradient(135deg, #f093fb 0%, #4facfe 100%);
            color: white;
            flex: 1;
            box-shadow: 0 10px 25px rgba(240, 147, 251, 0.2);
        }
        .btn-clear:hover { 
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(240, 147, 251, 0.3);
        }
        .preview { 
            margin: 30px 0;
            display: none;
            text-align: center;
            animation: fadeIn 0.4s ease;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .preview img { 
            max-width: 100%;
            max-height: 300px;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(102, 126, 234, 0.25);
            border: 3px solid rgba(240, 147, 251, 0.3);
        }
        .result {
            display: none;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.08) 0%, rgba(240, 147, 251, 0.08) 100%);
            border-radius: 15px;
            padding: 25px;
            border-left: 4px solid;
            border-image: linear-gradient(135deg, #667eea 0%, #f093fb 100%) 1;
            animation: slideIn 0.4s ease;
            backdrop-filter: blur(5px);
        }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
        .result.show { display: block; }
        .result-item {
            margin-bottom: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .result-label { 
            font-weight: 600; 
            color: #333; 
            font-size: 13px; 
            text-transform: uppercase; 
            letter-spacing: 0.5px;
        }
        .result-value { 
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .loading { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 600;
        }
        .error { 
            color: #ff6b6b; 
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Few Shot</h1>
            <div class="subtitle">Image Classification</div>
        </div>
        
        <div class="content">
            <div class="upload-box" onclick="document.getElementById('file').click()">
                <div class="upload-icon">📷</div>
                <div class="upload-text">Click to upload or drag and drop</div>
                <div class="upload-hint">PNG, JPG, GIF up to 16MB</div>
                <div class="file-name" id="file-name"></div>
                <input type="file" id="file" accept="image/*" />
            </div>
            
            <div class="button-group">
                <button class="btn-classify" id="btn-classify" onclick="classify()" disabled>Classify Image</button>
                <button class="btn-clear" onclick="clearAll()">Clear</button>
            </div>
            
            <div class="preview" id="preview">
                <img id="preview-img" />
            </div>
            
            <div class="result" id="result">
                <div class="result-item">
                    <span class="result-label">Predicted Class</span>
                    <span class="result-value" id="class">-</span>
                </div>
                <div class="result-item">
                    <span class="result-label">Confidence</span>
                    <span class="result-value" id="confidence">-</span>
                </div>
                <div class="scores" id="scores"></div>
            </div>
        </div>
    </div>
    
    <script>
        const fileInput = document.getElementById('file');
        const uploadBox = document.querySelector('.upload-box');
        
        fileInput.addEventListener('change', handleFileSelect);
        uploadBox.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadBox.style.borderColor = '#764ba2';
            uploadBox.style.background = '#f0f1ff';
        });
        uploadBox.addEventListener('dragleave', () => {
            uploadBox.style.borderColor = '#667eea';
            uploadBox.style.background = '#f8f9ff';
        });
        uploadBox.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadBox.style.borderColor = '#667eea';
            uploadBox.style.background = '#f8f9ff';
            fileInput.files = e.dataTransfer.files;
            handleFileSelect();
        });
        
        function handleFileSelect() {
            const file = fileInput.files[0];
            if (!file) return;
            
            document.getElementById('file-name').textContent = file.name;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('preview-img').src = e.target.result;
                document.getElementById('preview').style.display = 'block';
                document.getElementById('btn-classify').disabled = false;
            };
            reader.readAsDataURL(file);
        }
        
        function classify() {
            const file = fileInput.files[0];
            if (!file) return;
            
            const fd = new FormData();
            fd.append('file', file);
            
            document.getElementById('btn-classify').disabled = true;
            document.getElementById('result').classList.add('show');
            document.getElementById('result').innerHTML = '<div class="loading">⏳ Processing...</div>';
            
            fetch('/api/predict', { method: 'POST', body: fd })
                .then(r => r.json())
                .then(data => {
                    if (data.success) {
                        const result = `
                            <div class="result-item">
                                <span class="result-label">Predicted Class</span>
                                <span class="result-value">${data.prediction}</span>
                            </div>
                            <div class="result-item">
                                <span class="result-label">Confidence</span>
                                <span class="result-value">${data.confidence}</span>
                            </div>
                        `;
                        document.getElementById('result').innerHTML = result;
                    } else {
                        document.getElementById('result').innerHTML = '<div class="error">❌ ' + (data.error || 'Error occurred') + '</div>';
                    }
                    document.getElementById('btn-classify').disabled = false;
                })
                .catch(e => {
                    document.getElementById('result').innerHTML = '<div class="error">❌ ' + e.message + '</div>';
                    document.getElementById('btn-classify').disabled = false;
                });
        }
        
        function clearAll() {
            fileInput.value = '';
            document.getElementById('file-name').textContent = '';
            document.getElementById('preview').style.display = 'none';
            document.getElementById('result').classList.remove('show');
            document.getElementById('btn-classify').disabled = true;
        }
    </script>
</body>
</html>
